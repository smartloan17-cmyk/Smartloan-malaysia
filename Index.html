<!DOCTYPE html>
<html>
<head>
  <title>SmartLoan Malaysia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="font-family:Arial;text-align:center;padding:30px;">
  <h1>SmartLoan Malaysia</h1>
  <p>Fast Loan Approval in Malaysia</p>

  <form>
    Name<br>
    <input type="text"><br><br>

    Phone Number<br>
    <input type="text"><br><br>

    Loan Amount (RM)<br>
    <input type="text"><br><br>

    <button type="submit">Apply Now</button>
  </form>

  <p style="margin-top:30px;"><b>Required Documents</b></p>
  <ul style="list-style:none;padding:0;">
    <li>IC</li>
    <li>Payslips (3 months)</li>
    <li>Bank Statement (3 months)</li>
    <li>EPF Statement</li>
    <li>Electric / Water Bill</li>
  </ul>
</body>
</html>
